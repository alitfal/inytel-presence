<!-- index.html — Punto de entrada HTML de la aplicación Vue.js -->
<!doctype html>
<html lang="es">
  <head>
    <!-- Codificación de caracteres UTF-8 para soporte completo de español y símbolos -->
    <meta charset="UTF-8" />

    <!-- Favicon generado inline como SVG: cuadrado indigo con la "I" corporativa en blanco -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text x='50' y='75' font-size='70' font-weight='900' text-anchor='middle' fill='white' font-style='italic' font-family='sans-serif'>I</text></svg>">

    <!-- Configuración del viewport para diseño responsive en dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título de la pestaña del navegador -->
    <title>INYTEL Presence</title>
  </head>
  <body>
    <!-- Contenedor raíz donde Vue.js monta la aplicación -->
    <div id="app"></div>

    <!-- Punto de entrada del módulo JavaScript principal -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
