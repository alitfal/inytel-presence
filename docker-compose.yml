version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: inytel-db-v2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: inytel_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_v2_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: inytel-api-v2
    restart: always
    ports:
      - "3301:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root_password
      DB_NAME: inytel_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: inytel-web-v2
    restart: always
    ports:
      - "81:80"
      - "8443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  mysql_v2_data: